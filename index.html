<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой Игровой Хаб</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a1a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      h1 {
        margin-bottom: 30px;
        color: #00d4ff;
      }
      .menu {
        display: grid;
        gap: 20px;
      }
      .game-card {
        background: #333;
        padding: 20px;
        border-radius: 15px;
        text-decoration: none;
        color: white;
        text-align: center;
        transition: 0.3s;
        border: 2px solid transparent;
      }
      .game-card:hover {
        background: #444;
        border-color: #00d4ff;
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body>
    <h1>Выберите игру</h1>
    <div class="menu">
      <a href="dino.html" class="game-card">🦖 Динозаврик Chrome</a>
      <a href="bird.html" class="game-card">🐦 Flappy Bird</a>
    </div>
  </body>
</html>
