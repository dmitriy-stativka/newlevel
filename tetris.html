<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 20px;
      }

      .game-container {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 2.5rem;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }

      canvas {
        width: 100%;
        max-width: 400px;
        background: #000;
        border: 4px solid #334155;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      .info {
        display: flex;
        justify-content: space-between;
        margin: 20px 0;
        font-size: 1.2rem;
        font-weight: bold;
      }

      .mobile-controls {
        display: none;
        margin-top: 20px;
        gap: 12px;
      }

      .control-row {
        display: grid;
        gap: 12px;
      }

      .control-row:first-child {
        grid-template-columns: repeat(3, 1fr);
      }

      .control-row:last-child {
        grid-template-columns: repeat(3, 1fr);
      }

      .control-btn {
        height: 70px;
        border: none;
        border-radius: 18px;
        font-size: 2rem;
        font-weight: bold;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #06b6d4, #7c3aed);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
        transition: 0.1s;
        user-select: none;
        touch-action: manipulation;
      }

      .control-btn:active {
        transform: scale(0.92);
      }

      @media (max-width: 900px) {
        .mobile-controls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <h1>TETRIS</h1>

      <canvas id="tetris" width="300" height="600"></canvas>

      <div class="info">
        <span>Очки: <span id="score">0</span></span>
        <span>Рівень: <span id="level">1</span></span>
      </div>

      <div class="mobile-controls">
        <div class="control-row">
          <button class="control-btn" id="rotate">⟳</button>
          <button class="control-btn" id="drop">⬇</button>
          <button class="control-btn" id="hardDrop">⤓</button>
        </div>

        <div class="control-row">
          <button class="control-btn" id="left">◀</button>
          <button class="control-btn" id="down">▼</button>
          <button class="control-btn" id="right">▶</button>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("tetris");
      const context = canvas.getContext("2d");
      context.scale(30, 30);

      const colors = [
        null,
        "#FF0D72",
        "#0DC2FF",
        "#0DFF72",
        "#F538FF",
        "#FF8E0D",
        "#FFE138",
        "#3877FF",
      ];

      function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
          matrix.push(new Array(w).fill(0));
        }
        return matrix;
      }

      function createPiece(type) {
        if (type === "T") {
          return [
            [0, 1, 0],
            [1, 1, 1],
            [0, 0, 0],
          ];
        } else if (type === "O") {
          return [
            [2, 2],
            [2, 2],
          ];
        } else if (type === "L") {
          return [
            [0, 3, 0],
            [0, 3, 0],
            [0, 3, 3],
          ];
        } else if (type === "J") {
          return [
            [0, 4, 0],
            [0, 4, 0],
            [4, 4, 0],
          ];
        } else if (type === "I") {
          return [
            [0, 5, 0, 0],
            [0, 5, 0, 0],
            [0, 5, 0, 0],
            [0, 5, 0, 0],
          ];
        } else if (type === "S") {
          return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
          ];
        } else if (type === "Z") {
          return [
            [7, 7, 0],
            [0, 7, 7],
            [0, 0, 0],
          ];
        }
      }

      function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              context.fillStyle = colors[value];
              context.fillRect(x + offset.x, y + offset.y, 1, 1);
            }
          });
        });
      }

      function draw() {
        context.fillStyle = "#000";
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, { x: 0, y: 0 });
        drawMatrix(player.matrix, player.pos);
      }

      function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; y++) {
          for (let x = 0; x < m[y].length; x++) {
            if (
              m[y][x] !== 0 &&
              (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0
            ) {
              return true;
            }
          }
        }
        return false;
      }

      function merge(arena, player) {
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              arena[y + player.pos.y][x + player.pos.x] = value;
            }
          });
        });
      }

      function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; y--) {
          for (let x = 0; x < arena[y].length; x++) {
            if (arena[y][x] === 0) {
              continue outer;
            }
          }

          const row = arena.splice(y, 1)[0].fill(0);
          arena.unshift(row);
          y++;

          player.score += rowCount * 10;
          rowCount *= 2;
        }
      }

      function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
          player.pos.y--;
          merge(arena, player);
          playerReset();
          arenaSweep();
          updateScore();
        }
        dropCounter = 0;
      }

      function playerHardDrop() {
        while (!collide(arena, player)) {
          player.pos.y++;
        }
        player.pos.y--;
        playerDrop();
      }

      function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
          player.pos.x -= dir;
        }
      }

      function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; y++) {
          for (let x = 0; x < y; x++) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
          }
        }

        if (dir > 0) {
          matrix.forEach((row) => row.reverse());
        } else {
          matrix.reverse();
        }
      }

      function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;

        rotate(player.matrix, dir);

        while (collide(arena, player)) {
          player.pos.x += offset;
          offset = -(offset + (offset > 0 ? 1 : -1));

          if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
          }
        }
      }

      function playerReset() {
        const pieces = "TJLOSZI";
        player.matrix = createPiece(
          pieces[(pieces.length * Math.random()) | 0],
        );

        player.pos.y = 0;
        player.pos.x =
          ((arena[0].length / 2) | 0) - ((player.matrix[0].length / 2) | 0);

        if (collide(arena, player)) {
          arena.forEach((row) => row.fill(0));
          player.score = 0;
          updateScore();
        }
      }

      function updateScore() {
        document.getElementById("score").textContent = player.score;
        document.getElementById("level").textContent =
          Math.floor(player.score / 100) + 1;
      }

      let dropCounter = 0;
      let dropInterval = 1000;
      let lastTime = 0;

      function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;

        const level = Math.floor(player.score / 100);
        dropInterval = Math.max(100, 1000 - level * 80);

        if (dropCounter > dropInterval) {
          playerDrop();
        }

        draw();
        requestAnimationFrame(update);
      }

      const arena = createMatrix(10, 20);

      const player = {
        pos: { x: 0, y: 0 },
        matrix: null,
        score: 0,
      };

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          playerMove(-1);
        } else if (event.key === "ArrowRight") {
          playerMove(1);
        } else if (event.key === "ArrowDown") {
          playerDrop();
        } else if (event.key === "ArrowUp") {
          playerRotate(1);
        } else if (event.code === "Space") {
          playerHardDrop();
        }
      });

      function bindButton(id, action) {
        const btn = document.getElementById(id);

        btn.addEventListener("click", action);
        btn.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            action();
          },
          { passive: false },
        );
      }

      bindButton("left", () => playerMove(-1));
      bindButton("right", () => playerMove(1));
      bindButton("down", () => playerDrop());
      bindButton("rotate", () => playerRotate(1));
      bindButton("drop", () => playerDrop());
      bindButton("hardDrop", () => playerHardDrop());

      playerReset();
      updateScore();
      update();
    </script>
  </body>
</html>
