<!doctype html>
<html>
  <head>
    <title>Flappy Bird</title>
    <style>
      body {
        margin: 0;
        background: #70c5ce;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      canvas {
        display: block;
        background: #70c5ce;
        border: 4px solid #fff;
        margin-top: 20px;
      }
      .back {
        margin-top: 15px;
        text-decoration: none;
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        background: #333;
        padding: 10px 20px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <canvas id="birdCanvas" width="320" height="480"></canvas>
    <a href="index.html" class="back">← В меню</a>

    <script>
      const canvas = document.getElementById("birdCanvas");
      const ctx = canvas.getContext("2d");

      let bird = {
        x: 50,
        y: 150,
        w: 20,
        h: 20,
        gravity: 0.5,
        velocity: 0,
        jump: -8,
      };
      let pipes = [];
      let score = 0;
      let frame = 0;

      function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        bird.velocity += bird.gravity;
        bird.y += bird.velocity;

        if (frame % 100 === 0) {
          let gap = 120;
          let pipeTopHeight = Math.random() * (canvas.height - 250) + 50;
          pipes.push({
            x: canvas.width,
            top: pipeTopHeight,
            bottom: canvas.height - pipeTopHeight - gap,
          });
        }

        ctx.fillStyle = "yellow";
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        ctx.fillStyle = "green";
        for (let i = pipes.length - 1; i >= 0; i--) {
          let p = pipes[i];
          p.x -= 2;

          ctx.fillRect(p.x, 0, 40, p.top);
          ctx.fillRect(p.x, canvas.height - p.bottom, 40, p.bottom);

          if (
            bird.x < p.x + 40 &&
            bird.x + bird.w > p.x &&
            (bird.y < p.top || bird.y + bird.h > canvas.height - p.bottom)
          ) {
            location.reload();
          }

          if (p.x + 40 < 0) {
            pipes.splice(i, 1);
            score++;
          }
        }

        if (bird.y + bird.h > canvas.height || bird.y < 0) location.reload();

        ctx.fillStyle = "black";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 10, 25);

        frame++;
        requestAnimationFrame(update);
      }

      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") bird.velocity = bird.jump;
      });
      canvas.addEventListener("touchstart", () => (bird.velocity = bird.jump));

      update();
    </script>
  </body>
</html>
