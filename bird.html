<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Flappy Bird Mobile</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        padding: 0;
        background: #111;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: system-ui, sans-serif;
      }
      #gameCanvas {
        background: #70c5ce;
        display: block;
        image-rendering: pixelated;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        color: white;
      }
      .back-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        pointer-events: auto;
        text-decoration: none;
        color: white;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 15px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
      }
      #scoreBoard {
        text-align: center;
        margin-top: 20px;
        font-size: 40px;
        font-weight: bold;
        text-shadow: 2px 2px 0 #000;
        display: block;
      }
      #restartBtn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: auto;
        background: white;
        color: black;
        border: none;
        padding: 15px 30px;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        display: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <a href="index.html" class="back-btn">← Меню</a>
      <div id="scoreBoard">0</div>
      <button id="restartBtn" onclick="resetGame()">Играть снова</button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreBoard = document.getElementById("scoreBoard");
      const restartBtn = document.getElementById("restartBtn");

      let WIDTH = 320,
        HEIGHT = 480;
      let scale = 1;

      // Настройки игры
      const GRAVITY = 0.25;
      const FLAP = -5.5;
      const PIPE_SPEED = 2;
      const PIPE_GAP = 110; // Легкий уровень

      // Состояние игры
      let bird, pipes, score, isGameOver, loop, frameCount;

      function resize() {
        let winW = window.innerWidth;
        let winH = window.innerHeight;
        let screenRatio = winW / winH;
        let gameRatio = WIDTH / HEIGHT;

        if (screenRatio < gameRatio) {
          scale = winW / WIDTH;
        } else {
          scale = winH / HEIGHT;
        }

        canvas.width = WIDTH * scale;
        canvas.height = HEIGHT * scale;
        ctx.scale(scale, scale);
        canvas.style.marginTop = (winH - canvas.height) / 2 + "px";
      }

      window.addEventListener("resize", resize);
      resize();

      function resetGame() {
        bird = { x: 50, y: HEIGHT / 2, v: 0, r: 12 };
        pipes = [];
        score = 0;
        frameCount = 0;
        isGameOver = false;
        scoreBoard.innerText = score;
        restartBtn.style.display = "none";
        if (loop) cancelAnimationFrame(loop);
        gameLoop();
      }

      function flap() {
        if (isGameOver) return;
        bird.v = FLAP;
      }

      // Управление
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") flap();
      });
      canvas.addEventListener("touchstart", flap);
      canvas.addEventListener("mousedown", flap); // Для ПК клика

      function gameLoop() {
        if (isGameOver) return;
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // Птица
        bird.v += GRAVITY;
        bird.y += bird.v;

        // Отрисовка птицы
        ctx.fillStyle = "#f5b041"; // Тело
        ctx.beginPath();
        ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "white"; // Глаз
        ctx.beginPath();
        ctx.arc(bird.x + 5, bird.y - 3, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "black"; // Зрачок
        ctx.beginPath();
        ctx.arc(bird.x + 7, bird.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#e74c3c"; // Клюв
        ctx.beginPath();
        ctx.moveTo(bird.x + 10, bird.y);
        ctx.lineTo(bird.x + 18, bird.y + 3);
        ctx.lineTo(bird.x + 10, bird.y + 6);
        ctx.fill();

        // Создание труб
        if (frameCount % 100 === 0) {
          let topH = Math.random() * (HEIGHT - PIPE_GAP - 100) + 50;
          pipes.push({ x: WIDTH, top: topH });
        }

        // Трубы
        for (let i = pipes.length - 1; i >= 0; i--) {
          let p = pipes[i];
          p.x -= PIPE_SPEED;

          // Верхняя труба
          ctx.fillStyle = "#229954";
          ctx.fillRect(p.x, 0, 50, p.top);
          ctx.fillStyle = "#196f3d";
          ctx.fillRect(p.x - 2, p.top - 15, 54, 15); // Ободок

          // Нижняя труба
          let botY = p.top + PIPE_GAP;
          let botH = HEIGHT - botY;
          ctx.fillStyle = "#229954";
          ctx.fillRect(p.x, botY, 50, botH);
          ctx.fillStyle = "#196f3d";
          ctx.fillRect(p.x - 2, botY, 54, 15); // Ободок

          // Коллизии
          if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 50) {
            if (bird.y - bird.r < p.top || bird.y + bird.r > botY) {
              gameOver();
            }
          }

          if (p.x + 50 < 0) {
            pipes.splice(i, 1);
            score++;
            scoreBoard.innerText = score;
          }
        }

        // Земля/Потолок
        if (bird.y + bird.r > HEIGHT || bird.y - bird.r < 0) gameOver();

        frameCount++;
        loop = requestAnimationFrame(gameLoop);
      }

      function gameOver() {
        isGameOver = true;
        restartBtn.style.display = "block";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "white";
        ctx.font = "30px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Конец игры!", WIDTH / 2, HEIGHT / 2 - 40);
      }

      resetGame();
    </script>
  </body>
</html>
