<!doctype html>
<html>
  <head>
    <title>Dino Run</title>
    <style>
      body {
        text-align: center;
        background: #f7f7f7;
        font-family: monospace;
        overflow: hidden;
      }
      canvas {
        border-bottom: 2px solid #535353;
        margin-top: 50px;
        background: white;
      }
      .back {
        display: block;
        margin-top: 20px;
        text-decoration: none;
        color: #535353;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="800" height="200"></canvas>
    <p>Нажми Пробел, чтобы прыгнуть!</p>
    <a href="index.html" class="back">← Назад в меню</a>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      let score = 0;
      let gameSpeed = 5;
      let isGameOver = false;

      const dino = {
        x: 50,
        y: 150,
        w: 40,
        h: 40,
        dy: 0,
        jumpForce: 12,
        grounded: false,
        gravity: 0.6,
      };
      const obstacles = [];

      function spawnObstacle() {
        let size = Math.random() * (50 - 20) + 20;
        obstacles.push({
          x: canvas.width,
          y: canvas.height - size,
          w: 20,
          h: size,
        });
      }

      function update() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Гравитация и прыжок
        dino.dy += dino.gravity;
        dino.y += dino.dy;
        if (dino.y + dino.h > canvas.height) {
          dino.y = canvas.height - dino.h;
          dino.dy = 0;
          dino.grounded = true;
        }

        // Отрисовка Дино
        ctx.fillStyle = "#535353";
        ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

        // Препятствия
        if (Math.random() < 0.02) spawnObstacle();
        for (let i = obstacles.length - 1; i >= 0; i--) {
          let o = obstacles[i];
          o.x -= gameSpeed;
          ctx.fillRect(o.x, o.y, o.w, o.h);

          // Коллизия
          if (
            dino.x < o.x + o.w &&
            dino.x + dino.w > o.x &&
            dino.y < o.y + o.h &&
            dino.y + dino.h > o.y
          ) {
            isGameOver = true;
            alert("Game Over! Счет: " + Math.floor(score));
            location.reload();
          }

          if (o.x + o.w < 0) obstacles.splice(i, 1);
        }

        score += 0.1;
        gameSpeed += 0.001;
        requestAnimationFrame(update);
      }

      window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && dino.grounded) {
          dino.dy = -dino.jumpForce;
          dino.grounded = false;
        }
      });
      canvas.addEventListener("touchstart", () => {
        if (dino.grounded) {
          dino.dy = -dino.jumpForce;
          dino.grounded = false;
        }
      });

      update();
    </script>
  </body>
</html>
