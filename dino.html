<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Dino Chrome Clone</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f7f7f7;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        user-select: none;
      }

      #game-container {
        position: relative;
        width: 800px;
        height: 200px;
        background-color: #fff;
        border-bottom: 2px solid #535353;
        overflow: hidden;
      }

      #dino {
        position: absolute;
        bottom: 0;
        left: 50px;
        width: 40px;
        height: 44px;
        background-color: #535353;
        transition: height 0.1s;
      }

      /* Стиль когда дино приседает */
      #dino.ducking {
        height: 25px;
        background-color: #757575;
      }

      .cactus {
        position: absolute;
        bottom: 0;
        width: 20px;
        height: 40px;
        background-color: #ff4c4c;
      }

      #score {
        position: absolute;
        right: 20px;
        top: 10px;
        font-size: 20px;
        color: #535353;
      }

      #message {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        color: #535353;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="score">Score: 0</div>
      <div id="message">
        GAME OVER<br /><span style="font-size: 14px"
          >Нажми Пробел, чтобы начать заново</span
        >
      </div>
      <div id="dino"></div>
    </div>

    <script>
      const dino = document.getElementById("dino");
      const container = document.getElementById("game-container");
      const scoreElement = document.getElementById("score");
      const message = document.getElementById("message");

      let isJumping = false;
      let isDucking = false;
      let gravity = 0.9;
      let score = 0;
      let isGameOver = false;
      let gameSpeed = 5;

      // Управление
      document.addEventListener("keydown", function (event) {
        if (
          (event.code === "Space" || event.code === "ArrowUp") &&
          !isJumping &&
          !isGameOver
        ) {
          jump();
        }
        if (event.code === "ArrowDown" && !isJumping && !isGameOver) {
          duck(true);
        }
        if (event.code === "Space" && isGameOver) {
          restartGame();
        }
      });

      document.addEventListener("keyup", function (event) {
        if (event.code === "ArrowDown") {
          duck(false);
        }
      });

      function jump() {
        let position = 0;
        isJumping = true;

        let upInterval = setInterval(() => {
          if (position >= 120) {
            clearInterval(upInterval);

            let downInterval = setInterval(() => {
              if (position <= 0) {
                clearInterval(downInterval);
                isJumping = false;
                position = 0;
              }
              position -= 5;
              dino.style.bottom = position + "px";
            }, 20);
          }
          position += 5;
          dino.style.bottom = position + "px";
        }, 20);
      }

      function duck(state) {
        isDucking = state;
        if (state) {
          dino.classList.add("ducking");
        } else {
          dino.classList.remove("ducking");
        }
      }

      function createCactus() {
        if (isGameOver) return;

        const cactus = document.createElement("div");
        cactus.classList.add("cactus");
        container.appendChild(cactus);

        let cactusPosition = 800;
        cactus.style.left = cactusPosition + "px";

        // Случайная высота кактуса
        let randomHeight = Math.random() * (50 - 20) + 20;
        cactus.style.height = randomHeight + "px";

        let moveInterval = setInterval(() => {
          if (isGameOver) {
            clearInterval(moveInterval);
            return;
          }

          cactusPosition -= gameSpeed;
          cactus.style.left = cactusPosition + "px";

          if (cactusPosition < -20) {
            clearInterval(moveInterval);
            container.removeChild(cactus);
            score++;
            scoreElement.innerHTML = `Score: ${score}`;
            if (score % 5 === 0) gameSpeed += 0.2; // Ускорение игры
          }

          // Проверка столкновения
          let dinoRect = dino.getBoundingClientRect();
          let cactusRect = cactus.getBoundingClientRect();

          if (
            dinoRect.right > cactusRect.left &&
            dinoRect.left < cactusRect.right &&
            dinoRect.bottom > cactusRect.top
          ) {
            gameOver();
            clearInterval(moveInterval);
          }
        }, 20);

        // Появление следующего кактуса через случайное время
        if (!isGameOver) {
          setTimeout(createCactus, Math.random() * (2000 - 700) + 700);
        }
      }

      function gameOver() {
        isGameOver = true;
        message.style.display = "block";
      }

      function restartGame() {
        location.reload(); // Самый простой способ перезапуска
      }

      // Старт игры
      createCactus();
    </script>
  </body>
</html>
