<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Flappy Bird</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #70c5ce;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#70c5ce, #c0ecff);
      }

      #bird {
        position: absolute;
        width: 40px;
        height: 40px;
        background: yellow;
        border-radius: 50%;
        left: 20%;
        top: 50%;
      }

      .pipe {
        position: absolute;
        width: 60px;
        background: green;
        right: 0;
      }

      .pipe.top {
        top: 0;
      }

      .pipe.bottom {
        bottom: 0;
      }

      #ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 80px;
        background: #d9a066;
      }

      #scoreBoard {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
        z-index: 10;
        text-shadow: 1px 1px 2px #000;
      }

      #gameOver {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        display: none;
        z-index: 20;
      }

      #restartBtn {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        background: #ffcc00;
        cursor: pointer;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="bird"></div>
      <div id="ground"></div>

      <div id="scoreBoard">
        Score: 0<br />
        Best: 0
      </div>

      <div id="gameOver">
        <h1>Game Over</h1>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script>
      const bird = document.getElementById("bird");
      const game = document.getElementById("game");
      const scoreBoard = document.getElementById("scoreBoard");
      const gameOverScreen = document.getElementById("gameOver");
      const restartBtn = document.getElementById("restartBtn");

      let birdY = window.innerHeight / 2;
      let gravity = 0.5;
      let velocity = 0;
      let jump = -8;

      let pipes = [];
      let score = 0;
      let best = localStorage.getItem("best") || 0;
      let gameRunning = true;

      scoreBoard.innerHTML = `Score: 0<br>Best: ${best}`;

      function flap() {
        if (!gameRunning) return;
        velocity = jump;
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") flap();
      });

      document.addEventListener("click", flap);
      document.addEventListener("touchstart", flap);

      function createPipe() {
        let gap = 150;
        let pipeTopHeight = Math.random() * (window.innerHeight / 2);

        let topPipe = document.createElement("div");
        topPipe.classList.add("pipe", "top");
        topPipe.style.height = pipeTopHeight + "px";
        topPipe.style.width = "60px";
        topPipe.style.left = window.innerWidth + "px";

        let bottomPipe = document.createElement("div");
        bottomPipe.classList.add("pipe", "bottom");
        bottomPipe.style.height =
          window.innerHeight - pipeTopHeight - gap - 80 + "px";
        bottomPipe.style.width = "60px";
        bottomPipe.style.left = window.innerWidth + "px";

        game.appendChild(topPipe);
        game.appendChild(bottomPipe);

        pipes.push({
          top: topPipe,
          bottom: bottomPipe,
          x: window.innerWidth,
          passed: false,
        });
      }

      function resetGame() {
        location.reload();
      }

      restartBtn.addEventListener("click", resetGame);

      function update() {
        if (!gameRunning) return;

        velocity += gravity;
        birdY += velocity;
        bird.style.top = birdY + "px";

        if (birdY > window.innerHeight - 120 || birdY < 0) {
          endGame();
        }

        pipes.forEach((pipe) => {
          pipe.x -= 3;
          pipe.top.style.left = pipe.x + "px";
          pipe.bottom.style.left = pipe.x + "px";

          let birdLeft = window.innerWidth * 0.2;
          let birdRight = birdLeft + 40;

          if (
            birdRight > pipe.x &&
            birdLeft < pipe.x + 60 &&
            (birdY < pipe.top.offsetHeight ||
              birdY > window.innerHeight - pipe.bottom.offsetHeight - 80)
          ) {
            endGame();
          }

          if (!pipe.passed && pipe.x + 60 < birdLeft) {
            score++;
            pipe.passed = true;
            updateScore();
          }

          if (pipe.x < -60) {
            pipe.top.remove();
            pipe.bottom.remove();
          }
        });

        pipes = pipes.filter((p) => p.x > -100);

        requestAnimationFrame(update);
      }

      function updateScore() {
        scoreBoard.innerHTML = `Score: ${score}<br>Best: ${best}`;
      }

      function endGame() {
        gameRunning = false;
        gameOverScreen.style.display = "block";

        if (score > best) {
          best = score;
          localStorage.setItem("best", best);
        }
      }

      setInterval(() => {
        if (gameRunning) createPipe();
      }, 1800);

      update();
    </script>
  </body>
</html>
