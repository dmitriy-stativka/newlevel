<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird+</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: #70c5ce;
        overflow: hidden;
      }

      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(#70c5ce, #c0ecff);
      }

      /* ПТИЧКА */
      #bird {
        position: absolute;
        width: 42px;
        height: 42px;
        left: 20%;
        top: 50%;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff176, #fbc02d);
        box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.15);
        transform-origin: center;
      }

      /* глаз */
      #bird::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        top: 8px;
        right: 6px;
      }

      /* зрачок */
      #bird span {
        position: absolute;
        width: 6px;
        height: 6px;
        background: black;
        border-radius: 50%;
        top: 13px;
        right: 10px;
      }

      /* клюв */
      #bird .beak {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 14px solid #ff9800;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        right: -10px;
        top: 16px;
      }

      /* крыло */
      #bird::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 12px;
        background: #ffb300;
        border-radius: 50%;
        top: 18px;
        left: -8px;
        transform-origin: right center;
        animation: flap var(--flap-speed, 0.2s) infinite;
      }

      @keyframes flap {
        0% {
          transform: rotate(20deg);
        }
        50% {
          transform: rotate(-35deg);
        }
        100% {
          transform: rotate(20deg);
        }
      }

      /* трубы */
      .pipe {
        position: absolute;
        width: 60px;
        background: linear-gradient(to right, #2e7d32, #66bb6a);
        border: 3px solid #1b5e20;
      }

      .pipe.top {
        top: 0;
      }
      .pipe.bottom {
        bottom: 0;
      }

      /* земля */
      #ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 80px;
        background: linear-gradient(#d9a066, #b57f3f);
        border-top: 4px solid #8d5a2b;
      }

      /* счёт */
      #scoreBoard {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
        text-shadow: 2px 2px 3px black;
      }

      /* game over */
      #gameOver {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
        display: none;
      }

      #restartBtn {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        background: #ffcc00;
        cursor: pointer;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <div id="game">
      <div id="bird">
        <span></span>
        <div class="beak"></div>
      </div>

      <div id="ground"></div>

      <div id="scoreBoard">Score: 0<br />Best: 0</div>

      <div id="gameOver">
        <h1>Game Over</h1>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <script>
      const bird = document.getElementById("bird");
      const scoreBoard = document.getElementById("scoreBoard");
      const gameOverScreen = document.getElementById("gameOver");
      const restartBtn = document.getElementById("restartBtn");

      let birdY, velocity, pipes, score, gameRunning;
      let gravity = 0.5;
      let jump = -8;
      let best = localStorage.getItem("best") || 0;

      function initGame() {
        birdY = window.innerHeight / 2;
        velocity = 0;
        pipes = [];
        score = 0;
        gameRunning = true;

        document.querySelectorAll(".pipe").forEach((p) => p.remove());

        bird.style.top = birdY + "px";
        bird.style.transform = "rotate(0deg)";

        scoreBoard.innerHTML = `Score: 0<br>Best: ${best}`;
        gameOverScreen.style.display = "none";
      }

      function flap() {
        if (!gameRunning) return;
        velocity = jump;
      }

      document.addEventListener("click", flap);
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") flap();
      });

      /* РЕСТАРТ */
      restartBtn.addEventListener("click", initGame);

      function createPipe() {
        let gap = 150;
        let topH = Math.random() * (window.innerHeight / 2);

        let top = document.createElement("div");
        top.className = "pipe top";
        top.style.height = topH + "px";
        top.style.left = window.innerWidth + "px";

        let bottom = document.createElement("div");
        bottom.className = "pipe bottom";
        bottom.style.height = window.innerHeight - topH - gap - 80 + "px";
        bottom.style.left = window.innerWidth + "px";

        document.getElementById("game").appendChild(top);
        document.getElementById("game").appendChild(bottom);

        pipes.push({ top, bottom, x: window.innerWidth, passed: false });
      }

      function update() {
        if (gameRunning) {
          velocity += gravity;
          birdY += velocity;
          bird.style.top = birdY + "px";

          bird.style.transform = `rotate(${velocity * 3}deg)`;

          let speed = Math.max(0.1, Math.min(0.4, Math.abs(velocity) / 10));
          bird.style.setProperty("--flap-speed", speed + "s");

          if (birdY > window.innerHeight - 120 || birdY < 0) endGame();

          pipes.forEach((p) => {
            p.x -= 3;
            p.top.style.left = p.x + "px";
            p.bottom.style.left = p.x + "px";

            let birdLeft = window.innerWidth * 0.2;
            let birdRight = birdLeft + 42;

            if (
              birdRight > p.x &&
              birdLeft < p.x + 60 &&
              (birdY < p.top.offsetHeight ||
                birdY > window.innerHeight - p.bottom.offsetHeight - 80)
            ) {
              endGame();
            }

            if (!p.passed && p.x + 60 < birdLeft) {
              score++;
              p.passed = true;
              scoreBoard.innerHTML = `Score: ${score}<br>Best: ${best}`;
            }
          });

          pipes = pipes.filter((p) => p.x > -100);
        }

        requestAnimationFrame(update);
      }

      function endGame() {
        gameRunning = false;
        gameOverScreen.style.display = "block";

        if (score > best) {
          best = score;
          localStorage.setItem("best", best);
        }
      }

      setInterval(() => {
        if (gameRunning) createPipe();
      }, 1800);

      /* запуск */
      initGame();
      update();
    </script>
  </body>
</html>
