<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Neon Mario</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: linear-gradient(to bottom, #001f3f, #000);
        }
        canvas { display: block; }
        .hud {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px #000;
        }
        .controls-hint {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div>MARIO: <span id="score">000000</span></div>
        <div>COINS: <span id="coins">0</span></div>
        <div>WORLD: 1-1</div>
    </div>
    <canvas id="canvas"></canvas>
</div>
<div class="controls-hint">ARROWS to Move & Jump | Mobile: Tap Left/Right/Top sides</div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const WIDTH = 800;
const HEIGHT = 480;
const TILE_SIZE = 40;

canvas.width = WIDTH;
canvas.height = HEIGHT;

// Состояние игры
const game = {
    gravity: 0.6,
    friction: 0.85,
    cameraX: 0,
    score: 0,
    coins: 0
};

// Клавиши
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// Мобильное управление (простое)
canvas.addEventListener('touchstart', e => {
    const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    const touchY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
    if (touchY < HEIGHT / 3) keys['ArrowUp'] = true;
    else if (touchX < WIDTH / 2) keys['ArrowLeft'] = true;
    else keys['ArrowRight'] = true;
}, {passive: false});
canvas.addEventListener('touchend', () => {
    keys['ArrowUp'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
});

// Карта (0 - пусто, 1 - земля, 2 - кирпич, 3 - монетка блок, 4 - труба)
const level = [
    "                                                                                ",
    "                                                                                ",
    "      ---                                                                       ",
    "                                  ---                                           ",
    "             ?        ?                                                         ",
    "                                           ----                                 ",
    "        ---        ?     ?                                                      ",
    "                                     P                                          ",
    "    ?     #  #    ---               ---           # #        ?                  ",
    "                                                                                ",
    "111111111111111111111111   11111111111111111111111111111111111111111111111111111",
    "111111111111111111111111   11111111111111111111111111111111111111111111111111111"
];

class Player {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = 100;
        this.y = 200;
        this.w = 32;
        this.h = 40;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.facing = 1; // 1 - право, -1 - лево
        this.animFrame = 0;
    }
    update() {
        // Управление
        if (keys['ArrowRight']) { this.vx += 0.8; this.facing = 1; }
        if (keys['ArrowLeft']) { this.vx -= 0.8; this.facing = -1; }
        if ((keys['ArrowUp'] || keys['Space']) && this.onGround) {
            this.vy = -13;
            this.onGround = false;
        }

        this.vy += game.gravity;
        this.vx *= game.friction;

        this.x += this.vx;
        this.checkCollision(this.vx, 0);
        this.y += this.vy;
        this.checkCollision(0, this.vy);

        // Камера
        if (this.x > game.cameraX + WIDTH / 2) {
            game.cameraX = this.x - WIDTH / 2;
        }
        
        // Смерть при падении
        if (this.y > HEIGHT) this.reset();
    }

    checkCollision(vx, vy) {
        for (let row = 0; row < level.length; row++) {
            for (let col = 0; col < level[row].length; col++) {
                const char = level[row][col];
                if (char === ' ' || char === 'P') continue;

                const bx = col * TILE_SIZE;
                const by = row * TILE_SIZE;

                if (this.x < bx + TILE_SIZE && this.x + this.w > bx &&
                    this.y < by + TILE_SIZE && this.y + this.h > by) {
                    
                    if (vy > 0) { // Падение
                        this.y = by - this.h;
                        this.vy = 0;
                        this.onGround = true;
                    } else if (vy < 0) { // Удар головой
                        this.y = by + TILE_SIZE;
                        this.vy = 0;
                        if(char === '?') {
                            game.score += 100;
                            game.coins += 1;
                            // "Выбиваем" монетку (визуально менять лень, но логика есть)
                        }
                    }
                    if (vx > 0) this.x = bx - this.w;
                    if (vx < 0) this.x = bx + TILE_SIZE;
                }
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(-game.cameraX, 0);
        
        // Марио (неоновый человечек)
        ctx.fillStyle = "#ff3300"; // Кепка/Одежда
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff3300";
        
        // Анимация "шага"
        let walkOffset = Math.sin(Date.now() / 50) * 5;
        if (Math.abs(this.vx) < 0.2) walkOffset = 0;

        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        // Глаза/Детали
        ctx.fillStyle = "#000";
        ctx.fillRect(this.facing === 1 ? this.x + 20 : this.x + 5, this.y + 8, 5, 5);
        
        ctx.restore();
    }
}

class Enemy {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.w = 32;
        this.h = 32;
        this.vx = -2;
        this.dead = false;
    }
    update() {
        if(this.dead) return;
        this.x += this.vx;
        // Простая смена направления при столкновении (в рамках этого кода - просто по таймеру или границам)
        if(this.x % 400 === 0) this.vx *= -1;
    }
    draw() {
        if(this.dead) return;
        ctx.save();
        ctx.translate(-game.cameraX, 0);
        ctx.fillStyle = "#ff00ff";
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.restore();
    }
}

const player = new Player();
const enemies = [new Enemy(600, 360), new Enemy(1200, 360)];

function drawLevel() {
    ctx.save();
    ctx.translate(-game.cameraX, 0);
    
    for (let row = 0; row < level.length; row++) {
        for (let col = 0; col < level[row].length; col++) {
            const char = level[row][col];
            const x = col * TILE_SIZE;
            const y = row * TILE_SIZE;

            if (char === '1') { // Земля
                ctx.fillStyle = '#111';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#00f2ff';
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            } else if (char === '-') { // Платформа
                ctx.fillStyle = '#333';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE / 2);
                ctx.strokeStyle = '#ff00ff';
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE / 2);
            } else if (char === '?') { // Секрет
                ctx.fillStyle = '#ffcc00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffcc00';
                ctx.fillRect(x + 5, y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                ctx.shadowBlur = 0;
            } else if (char === '#') { // Кирпич
                ctx.fillStyle = '#663300';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            } else if (char === 'P') { // Труба
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(x, y, TILE_SIZE * 1.5, TILE_SIZE * 2);
                ctx.strokeRect(x, y, TILE_SIZE * 1.5, TILE_SIZE * 2);
            }
        }
    }
    ctx.restore();
}

function update() {
    player.update();
    enemies.forEach(e => {
        e.update();
        // Коллизия с игроком
        if (!e.dead && player.x < e.x + e.w && player.x + player.w > e.x &&
            player.y < e.y + e.h && player.y + player.h > e.y) {
            if (player.vy > 0) { // Напрыгнул сверху
                e.dead = true;
                player.vy = -10;
                game.score += 200;
            } else { // Умер
                player.reset();
                game.score = 0;
            }
        }
    });

    document.getElementById('score').innerText = String(Math.floor(game.score)).padStart(6, '0');
    document.getElementById('coins').innerText = game.coins;
}

function loop() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    
    // Фон (параллакс облака можно добавить, но пока просто сетка)
    ctx.strokeStyle = '#001122';
    for(let i=0; i<WIDTH; i+=50) {
        ctx.beginPath();
        ctx.moveTo(i - (game.cameraX % 50), 0);
        ctx.lineTo(i - (game.cameraX % 50), HEIGHT);
        ctx.stroke();
    }

    drawLevel();
    player.draw();
    enemies.forEach(e => e.draw());

    update();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
